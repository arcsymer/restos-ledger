name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { cc: gcc, cxx: g++ }
          - { cc: clang, cxx: clang++ }
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: build + test (${{ matrix.cc }})
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug
          cmake --build build
          ctest --test-dir build --output-on-failure

  sanitizers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        san: [address, thread]
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: build + test under ${{ matrix.san }}sanitizer
        run: |
          if [ "${{ matrix.san }}" = "address" ]; then FLAG=-DRESTOS_SANITIZE=ON; else FLAG=-DRESTOS_TSAN=ON; fi
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug $FLAG
          cmake --build build
          ctest --test-dir build --output-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: warning-clean build (-Werror)
        run: |
          cmake -S . -B build -G Ninja -DRESTOS_WERROR=ON
          cmake --build build

  windows-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v7
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
      - name: build + test (MinGW)
        run: |
          cmake -S . -B build -G Ninja
          cmake --build build
          ctest --test-dir build --output-on-failure

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
